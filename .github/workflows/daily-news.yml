name: Daily Angola News Pipeline

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js for agent-browser
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install agent-browser
        run: npm install -g agent-browser

      - name: Configure environment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=$GEMINI_API_KEY
          ZHIPU_API_KEY=$ZHIPU_API_KEY
          ANTHROPIC_AUTH_TOKEN=$ANTHROPIC_AUTH_TOKEN
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          EOF

      - name: Run Angola News Pipeline
        env:
          AGENT_BROWSER_DEFAULT_TIMEOUT: '60000'
        run: bash RUN_ALL.sh

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push database updates
        run: |
          if git diff --quiet data/articles-db.json data/sent-history.json; then
            echo "No changes to commit"
          else
            git add data/articles-db.json data/sent-history.json
            git commit -m "chore: update article database and push history

- Articles processed: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
- New articles added to database
- Updated push history

[skip ci]"
            git push
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-logs
          path: data/runs/
          retention-days: 7
