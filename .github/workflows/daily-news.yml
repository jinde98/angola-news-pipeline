name: Daily Angola News Pipeline

on:
  schedule:
    - cron: '0 8,9,10,11,12,13,14 * * *'  # Every day at 08:00-14:00 UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write         # Required to push data updates back to repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js for agent-browser
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install agent-browser and Playwright
        run: |
          npm install -g agent-browser
          npx playwright install --with-deps chromium

      - name: Configure environment
        run: |
          printf '%s\n' \
            'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}' \
            'ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}' \
            'ANTHROPIC_AUTH_TOKEN=${{ secrets.ANTHROPIC_AUTH_TOKEN }}' \
            'TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}' \
            'TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}' \
            > .env

      - name: Run Angola News Pipeline
        env:
          AGENT_BROWSER_DEFAULT_TIMEOUT: '60000'
        run: bash RUN_ALL.sh

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles-db.json \
                 data/sent-history.json \
                 data/extracted-headlines.json \
                 data/delta-new.json \
                 data/filtered-candidates.json \
                 data/translated-headlines.json \
                 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            COMMIT_DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "chore: daily pipeline update ($COMMIT_DATE) [skip ci]"
            git push
            echo "Pushed data updates to GitHub"
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: data/runs/
          retention-days: 7
